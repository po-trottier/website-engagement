<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSVP Dashboard — P-O &amp; Athena's Engagement Party</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1C5630;
      --accent: #f07a2b;
      --bg: #E7D8C6;
      --text: #1F2E27;
      --bg-light: #f0e8dc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Cormorant Garamond", Georgia, serif;
      background: var(--bg);
      color: var(--text);
      padding: 2rem 1rem;
      line-height: 1.6;
    }

    .container { max-width: 1100px; margin: 0 auto; }

    h1 {
      font-size: 2rem;
      color: var(--primary);
      text-align: center;
      margin-bottom: 2rem;
    }

    /* ---------- Login ---------- */
    .login {
      max-width: 320px;
      margin: 4rem auto;
      text-align: center;
    }

    .login label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    .login input {
      width: 100%;
      padding: 0.7rem;
      border: 1.5px solid rgba(28,86,48,0.3);
      background: transparent;
      font-family: inherit;
      font-size: 1rem;
      text-align: center;
      outline: none;
    }

    .login input:focus { border-color: var(--primary); }

    .login .button { margin-top: 1rem; }

    .login-error {
      color: var(--accent);
      margin-top: 0.8rem;
      font-size: 0.9rem;
      display: none;
    }

    /* ---------- Dashboard ---------- */
    .dashboard { display: none; }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .card {
      background: var(--bg-light);
      padding: 1.2rem;
      text-align: center;
      border-radius: 4px;
    }

    .card-value {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--primary);
    }

    .card-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.7;
      margin-top: 0.3rem;
    }

    /* ---------- Action bar ---------- */
    .action-bar {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      margin-bottom: 1.5rem;
    }

    .action-bar-divider {
      width: 1px;
      height: 1.2rem;
      background: rgba(28,86,48,0.2);
      margin: 0 0.3rem;
    }

    .action-bar-count {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--primary);
      opacity: 0.6;
    }

    .action-bar-spacer { width: 1em; flex-shrink: 0; }
    .action-bar-push { flex: 1; }

    /* ---------- Buttons ---------- */
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem 1rem;
      background: transparent;
      border: 1.5px solid var(--primary);
      color: var(--primary);
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s, color 0.3s, opacity 0.3s;
      gap: 0.4rem;
      white-space: nowrap;
    }

    .button:hover { background: var(--primary); color: var(--bg); }

    .button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .button:disabled:hover {
      background: transparent;
      color: var(--primary);
    }

    .button-icon {
      padding: 0.4rem;
      line-height: 1;
      letter-spacing: 0;
      border: none;
    }

    .button-icon:hover {
      background: transparent;
      color: var(--accent);
    }

    .button-icon:disabled:hover {
      background: transparent;
      color: var(--primary);
    }


    .icon {
      width: 1.5rem;
      height: 1.5rem;
      vertical-align: -0.35rem;
      fill: currentColor;
    }

    .button-danger {
      border-color: #c0392b;
      color: #c0392b;
    }

    .button-danger:hover { background: #c0392b; color: var(--bg); }

    .button-icon.button-danger {
      color: #c0392b;
    }

    .button-icon.button-danger:hover {
      background: transparent;
      color: var(--accent);
    }

    .button-icon.button-danger:disabled {
      color: #c0392b;
    }

    .button-icon.button-danger:disabled:hover {
      background: transparent;
      color: #c0392b;
    }

    /* ---------- Export popover ---------- */
    .export-wrap {
      position: relative;
    }

    .export-menu {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 0.3rem;
      background: var(--bg);
      border: 1.5px solid rgba(28,86,48,0.2);
      box-shadow: 0 4px 12px rgba(28,86,48,0.08);
      z-index: 10;
      min-width: 140px;
    }

    .export-menu.open { display: flex; flex-direction: column; }

    .export-menu button {
      padding: 0.5rem 0.8rem;
      background: none;
      border: none;
      font-family: inherit;
      font-size: 0.8rem;
      color: var(--text);
      cursor: pointer;
      text-align: left;
      transition: background 0.2s;
    }

    .export-menu button:hover { background: rgba(28,86,48,0.06); }

    /* ---------- Table ---------- */
    .table-wrap {
      overflow-x: auto;
      margin-bottom: 2rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th {
      text-align: left;
      padding: 0.6rem 0.8rem;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--primary);
      border-bottom: 2px solid var(--primary);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    th:hover { opacity: 0.7; }

    td {
      padding: 0.6rem 0.8rem;
      border-bottom: 1px solid rgba(28,86,48,0.1);
    }

    tr:hover td { background: rgba(28,86,48,0.03); }

    .select-col {
      width: 30px;
      text-align: center;
      vertical-align: middle;
      cursor: default;
    }

    .select-col:hover { opacity: 1; }

    .select-col input {
      cursor: pointer;
      width: 16px;
      height: 16px;
      accent-color: var(--primary);
      vertical-align: middle;
    }

    .td-date {
      white-space: nowrap;
      font-size: 0.8rem;
      opacity: 0.7;
    }

    /* ---------- Editable fields ---------- */
    .edit-field {
      width: 100%;
      padding: 0.3rem 0.4rem;
      border: 1px solid transparent;
      background: transparent;
      font-family: inherit;
      font-size: 0.85rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .edit-field:focus {
      border-color: var(--primary);
      background: var(--bg-light);
    }

    .edit-field-small { width: 50px; text-align: center; }

    select.edit-field { cursor: pointer; }

    .edit-field.dirty {
      border-color: var(--accent);
    }

    .row-new td {
      background: rgba(240, 122, 43, 0.06);
    }

    /* ---------- Pagination ---------- */
    .pagination {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      margin-bottom: 2rem;
      font-size: 0.8rem;
    }

    .pagination button:not(.button-icon) {
      padding: 0.3rem 0.6rem;
      background: transparent;
      border: 1.5px solid rgba(28,86,48,0.2);
      color: var(--primary);
      font-family: inherit;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .pagination button:hover { background: rgba(28,86,48,0.06); }
    .pagination button.active { background: var(--primary); color: var(--bg); border-color: var(--primary); }
    .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }
    .pagination button:disabled:hover { background: transparent; }

    .pagination-ellipsis {
      padding: 0 0.3rem;
      opacity: 0.5;
    }

    .pagination-info {
      flex-basis: 100%;
      text-align: center;
      opacity: 0.5;
      margin-top: 0.3rem;
      font-size: 0.75rem;
    }

    /* ---------- Home link ---------- */
    .home-link {
      display: block;
      text-align: center;
      margin-top: 2rem;
      font-size: 0.85rem;
      color: var(--primary);
      text-decoration: underline;
      text-decoration-color: rgba(28,86,48,0.25);
    }

    .home-link:hover {
      color: var(--accent);
      text-decoration-color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="container">
    <div style="display:flex; align-items:center; margin-bottom:2rem;">
      <a href="/" class="button button-icon" title="Back to Home" style="text-decoration:none; margin-right:1rem;"><svg class="icon" viewBox="0 0 24 24"><path d="M10,20V14H14V20H19V12H22L12,3L2,12H5V20H10Z"/></svg></a>
      <h1 style="margin:0; flex:1; text-align:center;">RSVP Dashboard</h1>
      <button class="button button-icon" id="logout-btn" title="Logout" style="display:none; margin-left:1rem;"><svg class="icon" viewBox="0 0 24 24"><path d="M16,17V14H9V10H16V7L21,12L16,17M14,2A2,2 0 0,1 16,4V6H14V4H5V20H14V18H16V20A2,2 0 0,1 14,22H5A2,2 0 0,1 3,20V4A2,2 0 0,1 5,2H14Z"/></svg></button>
    </div>

    <!-- Login -->
    <div class="login" id="login">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter admin password" autofocus>
      <button class="button" id="login-btn">View RSVPs</button>
      <p class="login-error" id="login-error">Invalid password. Please try again.</p>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
      <div class="cards" id="cards"></div>

      <div class="action-bar">
        <button class="button button-icon" id="add-btn" title="Add guest"><svg class="icon" viewBox="0 0 24 24"><path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z"/></svg></button>
        <button class="button button-icon button-danger" id="batch-delete-btn" disabled title="Delete selected"><svg class="icon" viewBox="0 0 24 24"><path d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></svg></button>
        <span class="action-bar-spacer"></span>
        <button class="button button-icon" id="save-btn" disabled title="Save changes"><svg class="icon" viewBox="0 0 24 24"><path d="M15,9H5V5H15M12,19A3,3 0 0,1 9,16A3,3 0 0,1 12,13A3,3 0 0,1 15,16A3,3 0 0,1 12,19M17,3H5C3.89,3 3,3.9 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V7L17,3Z"/></svg></button>
        <span class="action-bar-spacer"></span>
        <button class="button button-icon" id="batch-email-btn" disabled title="Send email to selected"><svg class="icon" viewBox="0 0 24 24"><path d="M20,8L12,13L4,8V6L12,11L20,6M20,4H4C2.89,4 2,4.89 2,6V18A2,2 0 0,0 4,20H20A2,2 0 0,0 22,18V6C22,4.89 21.1,4 20,4Z"/></svg></button>
        <span class="action-bar-divider"></span>
        <span class="action-bar-count"><span id="batch-count">0</span> selected</span>
        <span class="action-bar-push"></span>
        <div class="export-wrap">
          <button class="button" id="export-btn"><svg class="icon" viewBox="0 0 24 24"><path d="M23,12L19,8V11H10V13H19V16M1,18V6C1,4.89 1.9,4 3,4H15A2,2 0 0,1 17,6V9H15V6H3V18H15V15H17V18A2,2 0 0,1 15,20H3A2,2 0 0,1 1,18Z"/></svg> Export</button>
          <div class="export-menu" id="export-menu">
            <button id="export-csv"><svg class="icon" viewBox="0 0 24 24"><path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20Z"/></svg> CSV</button>
          </div>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>

    </div>
  </div>

  <script src="../js/admin.js"></script>
</body>
</html>
