<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — P-O &amp; Athena's Engagement Party</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1C5630;
      --accent: #f07a2b;
      --background: #E7D8C6;
      --text: #1F2E27;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Cormorant Garamond", Georgia, serif;
      color: var(--text);
      background: var(--background);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      line-height: 1.75;
    }

    .logo { width: 75px; height: auto; margin-bottom: 1rem; }

    h1 {
      font-family: "Playfair Display", Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: 3rem;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 2rem;
      opacity: 0.7;
    }

    .button {
      display: inline-block;
      padding: 0.75rem 2.4rem;
      border: 2px solid var(--primary);
      background: transparent;
      color: var(--primary);
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background-color 0.4s ease;
    }

    .button:hover {
      background-color: rgba(28, 86, 48, 0.1);
    }
  </style>
</head>
<body>
  <img src="/images/logo.svg" alt="" class="logo">
  <h1>Oops!</h1>
  <p>This page doesn't exist. Let's get you back to the party.</p>
  <a href="/" class="button">Back to Home</a>
</body>
</html>
